apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-gateway-config
  namespace: otel-demo
data:
  config.yaml: |
    #CONFIG collector
    extensions:
      bearertokenauth:
        token: ${env:SECRET_TOKEN_APM_SERVER}
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128
      resource:
        attributes:
          - key: deployment.environment.name
            value: demo
            action: upsert
      batch:
        timeout: 5s
    exporters:
      otlphttp:
        endpoint: http://host.k3d.internal:8200
        auth:
          authenticator: bearertokenauth
      debug:
        verbosity: detailed
    service:
      extensions: [bearertokenauth]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlphttp,debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlphttp,debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlphttp,debug]