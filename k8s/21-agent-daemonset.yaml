apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-agent
  namespace: otel-demo
spec:
  selector:
    matchLabels:
      app: otel-agent
  template:
    metadata:
      labels:
        app: otel-agent
    spec:
      containers:
      - image: otel/opentelemetry-collector-contrib:0.154.0
        name: otel-agent
        args:
          - "--config=/etc/otelcol-contrib/config.yaml"
        resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 512Mi
        ports:
          - containerPort: 4317
            hostPort: 4317
          - containerPort: 4318
            hostPort: 4318
        volumeMounts:
          - name: config
            mountPath: /etc/otelcol-contrib/config.yaml
            subPath: config.yaml
      volumes: 
        - name: config
          configMap:
            name: otel-agent-config
