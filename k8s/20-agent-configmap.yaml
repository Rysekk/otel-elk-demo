apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-agent-config
  namespace: otel-demo
data:
  config.yaml: |
    #CONFIG collector
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128
      k8s_attributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
            - k8s.pod.uid
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection
      resource:
        attributes:
          - key: deployment.environment.name
            value: demo
            action: upsert
      batch:
        timeout: 5s
    exporters:
      otlp_grpc:
        endpoint: otel-gateway:4317
        tls:
          insecure: true
      debug:
        verbosity: detailed
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8s_attributes, resource, batch]
          exporters: [otlp_grpc,debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8s_attributes, resource, batch]
          exporters: [otlp_grpc,debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8s_attributes, resource, batch]
          exporters: [otlp_grpc,debug]