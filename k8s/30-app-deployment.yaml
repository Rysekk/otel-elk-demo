apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: otel-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
      - image: otel-elk-demo-app:latest
        imagePullPolicy: IfNotPresent
        name: app
        env:
          - name: NODE_IP
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          - name: POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: OTEL_SERVICE_NAME
            value: fastapi-demo
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: http://$(NODE_IP):4317
          - name: OTEL_EXPORTER_OTLP_PROTOCOL
            value: grpc
          - name: OTEL_RESOURCE_ATTRIBUTES
            value: "k8s.pod.ip=$(POD_IP)"
        resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 512Mi
        ports:
          - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: otel-demo
spec:
  selector:
    app: app
  ports:
    - name: app-port
      port: 8080
      targetPort: 8080
      protocol: TCP