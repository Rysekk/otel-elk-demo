apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-gateway
  namespace: otel-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-gateway
  template:
    metadata:
      labels:
        app: otel-gateway
    spec:
      containers:
      - image: otel/opentelemetry-collector-contrib:0.154.0
        name: otel-gateway
        args:
          - "--config=/etc/otelcol-contrib/config.yaml"
        env:
          - name: SECRET_TOKEN_APM_SERVER
            valueFrom:
              secretKeyRef:
                name: apm-server-token
                key: token
        resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 512Mi
        ports:
          - containerPort: 4317
          - containerPort: 4318
        volumeMounts:
          - name: config
            mountPath: /etc/otelcol-contrib/config.yaml
            subPath: config.yaml
      volumes: 
        - name: config
          configMap:
            name: otel-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-gateway
  namespace: otel-demo
spec:
  selector:
    app: otel-gateway
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP